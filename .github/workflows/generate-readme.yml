name: Generate LeetCode README

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate README
        run: |
          cat > generate_readme.py <<'PYTHON'
          import os
          import re
          from collections import defaultdict

          topics = defaultdict(list)

          for folder in os.listdir("."):
              if not os.path.isdir(folder):
                  continue
              if not re.match(r"^\d+-", folder):
                  continue

              path = os.path.join(folder, "README.md")
              if not os.path.exists(path):
                  continue

              with open(path, encoding="utf-8") as file:
                  content = file.read()

              number = int(folder.split("-")[0])
              title = folder.split("-", 1)[1].replace("-", " ").title()

              title_match = re.search(r"<h2>.*?>(.*?)</a></h2>", content, re.S)
              if title_match:
                  title = re.sub(r"^\d+\.\s*", "", title_match.group(1)).strip()

              difficulty_match = re.search(
                  r"<h3>(Easy|Medium|Hard)</h3>",
                  content,
                  re.I
              )

              difficulty = "Unknown"
              if difficulty_match:
                  difficulty = difficulty_match.group(1).title()

              topic_match = re.search(
                  r"<strong>Topics</strong>.*?<ul>(.*?)</ul>",
                  content,
                  re.S | re.I
              )

              found_topics = []

              if topic_match:
                  found_topics = re.findall(
                      r"<li>(.*?)</li>",
                      topic_match.group(1),
                      re.S
                  )

                  found_topics = [
                      re.sub(r"<.*?>", "", item).strip()
                      for item in found_topics
                  ]

              if not found_topics:
                  found_topics = ["Other"]

              for topic in found_topics:
                  topics[topic].append(
                      (number, title, difficulty, folder)
                  )

          lines = [
              "# LeetCode Solutions",
              "",
              "## LeetCode Topics",
              ""
          ]

          icons = {
              "Easy": "🟢",
              "Medium": "🟡",
              "Hard": "🔴",
              "Unknown": "⚪"
          }

          for topic in sorted(topics):
              lines.append("### " + topic)
              lines.append("")
              lines.append("| Problem | Difficulty |")
              lines.append("| --- | --- |")

              for number, title, difficulty, folder in sorted(topics[topic]):
                  icon = icons.get(difficulty, "⚪")
                  lines.append(
                      f"| [{number}. {title}]({folder}) | {icon} {difficulty} |"
                  )

              lines.append("")

          with open("README.md", "w", encoding="utf-8") as file:
              file.write("\n".join(lines))
          PYTHON

          python generate_readme.py

      - name: Commit README
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet || git commit -m "Auto update LeetCode README"
          git push
