name: Generate LeetCode README

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate README
        run: |
          cat > generate_readme.py <<'PYTHON'
          import os
          import re
          import json
          import urllib.request
          from collections import defaultdict

          API_URL = "https://leetcode.com/graphql"

          def get_metadata(slug):
              query = """
              query questionData($titleSlug: String!) {
                question(titleSlug: $titleSlug) {
                  questionFrontendId
                  title
                  difficulty
                  topicTags {
                    name
                  }
                }
              }
              """

              payload = json.dumps({
                  "query": query,
                  "variables": {
                      "titleSlug": slug
                  }
              }).encode("utf-8")

              request = urllib.request.Request(
                  API_URL,
                  data=payload,
                  headers={
                      "Content-Type": "application/json",
                      "User-Agent": "Mozilla/5.0",
                      "Referer": "https://leetcode.com/"
                  }
              )

              try:
                  with urllib.request.urlopen(
                      request,
                      timeout=20
                  ) as response:
                      result = json.loads(
                          response.read().decode("utf-8")
                      )

                  return result.get("data", {}).get("question")

              except Exception as error:
                  print(
                      "Metadata failed for",
                      slug,
                      ":",
                      error
                  )
                  return None


          problems = defaultdict(list)
          folders = []

          for folder in os.listdir("."):
              if (
                  os.path.isdir(folder)
                  and re.match(r"^\d+-", folder)
              ):
                  folders.append(folder)

          folders.sort(
              key=lambda value: int(value.split("-")[0])
          )

          for index, folder in enumerate(folders, start=1):
              slug = folder.split("-", 1)[1]

              print(
                  f"[{index}/{len(folders)}] Fetching {slug}"
              )

              metadata = get_metadata(slug)

              if metadata:
                  title = metadata["title"]
                  difficulty = metadata["difficulty"]

                  topics = [
                      tag["name"]
                      for tag in metadata["topicTags"]
                  ]

                  if not topics:
                      topics = ["Other"]

              else:
                  title = slug.replace("-", " ").title()
                  difficulty = "Unknown"
                  topics = ["Other"]

              number = int(folder.split("-")[0])

              for topic in topics:
                  problems[topic].append({
                      "number": number,
                      "title": title,
                      "difficulty": difficulty,
                      "folder": folder
                  })


          lines = [
              "# LeetCode Solutions 🚀",
              "",
              "Solutions to LeetCode problems organised by topic.",
              "",
              f"**Total Problems: {len(folders)}**",
              "",
              "## LeetCode Topics",
              ""
          ]

          icons = {
              "Easy": "🟢",
              "Medium": "🟡",
              "Hard": "🔴",
              "Unknown": "⚪"
          }

          for topic in sorted(problems):
              lines.append(f"### {topic}")
              lines.append("")
              lines.append("| Problem | Difficulty |")
              lines.append("| --- | --- |")

              for problem in sorted(
                  problems[topic],
                  key=lambda value: value["number"]
              ):
                  number = problem["number"]
                  title = problem["title"]
                  difficulty = problem["difficulty"]
                  folder = problem["folder"]

                  icon = icons.get(difficulty, "⚪")

                  lines.append(
                      f"| [{number}. {title}]({folder}) "
                      f"| {icon} {difficulty} |"
                  )

              lines.append("")


          with open(
              "README.md",
              "w",
              encoding="utf-8"
          ) as file:
              file.write("\n".join(lines))

          print("README generated successfully")
          PYTHON

          python generate_readme.py

      - name: Commit README
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet || git commit -m "Auto update LeetCode README"
          git push
